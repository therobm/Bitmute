name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Windows workload
        run: dotnet workload install maui-windows

      - name: Publish self-contained win-x64
        run: dotnet publish Bitmute/Bitmute.csproj -f net10.0-windows10.0.19041.0 -c Release -p:RuntimeIdentifier=win-x64 -p:SelfContained=true -p:WindowsAppSDKSelfContained=true

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path "Bitmute/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish/*" -DestinationPath "Bitmute-win-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bitmute-win-x64
          path: Bitmute-win-x64.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Bitmute-win-x64.zip
